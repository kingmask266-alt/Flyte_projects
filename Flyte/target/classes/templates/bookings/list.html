<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flyte - Bookings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
        .topbar { background: #1a1a2e; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #00d4ff33; }
        .topbar h1 { font-size: 24px; color: #00d4ff; letter-spacing: 3px; }
        .topbar nav a { color: #aaa; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .topbar nav a:hover { color: #00d4ff; }
        .container { padding: 40px; }
        .page-title { font-size: 22px; color: #fff; margin-bottom: 24px; }
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; }
        th { background: #0f0f1a; color: #888; font-size: 11px; letter-spacing: 2px; padding: 16px 20px; text-align: left; }
        td { padding: 16px 20px; border-top: 1px solid #ffffff08; }
        tr:hover td { background: #ffffff05; }
        .badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-confirmed { background: #00ff8822; color: #00ff88; }
        .badge-pending    { background: #ffaa0022; color: #ffaa00; }
        .badge-cancelled  { background: #ff4d4d22; color: #ff4d4d; }
        .btn { padding: 6px 16px; font-size: 12px; font-weight: 700; cursor: pointer; text-decoration: none; border: none; border-radius: 6px; letter-spacing: 1px; }
        .btn-confirm { background: #00ff8822; color: #00ff88; border: 1px solid #00ff8844; }
        .btn-danger  { background: #ff4d4d22; color: #ff4d4d;  border: 1px solid #ff4d4d44; }
        .actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>✈ FLYTE</h1>
    <nav>
        <a href="/admin">Dashboard</a>
        <a href="/flights">Flights</a>
        <a href="/bookings">Bookings</a>
    </nav>
</div>
<div class="container">
    <div class="page-title">All Bookings</div>
    <table>
        <thead>
            <tr>
                <th>#</th><th>PASSENGER</th><th>FLIGHT</th>
                <th>ROUTE</th><th>STATUS</th><th>ACTIONS</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.id}"></td>
                <td th:text="${booking.passengerName}"></td>
                <td th:text="${booking.flight.flightNumber}"></td>
                <td th:text="${booking.flight.origin + ' → ' + booking.flight.destination}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${booking.status == 'Confirmed'} ? 'badge-confirmed' : (${booking.status == 'Pending'} ? 'badge-pending' : 'badge-cancelled')"
                          th:text="${booking.status}">
                    </span>
                </td>
                <td>
                    <div class="actions">
                        <form th:action="@{/bookings/status/{id}(id=${booking.id})}" method="post">
                            <input type="hidden" name="status" value="Confirmed"/>
                            <button type="submit" class="btn btn-confirm">CONFIRM</button>
                        </form>
                        <form th:action="@{/bookings/status/{id}(id=${booking.id})}" method="post">
                            <input type="hidden" name="status" value="Cancelled"/>
                            <button type="submit" class="btn btn-danger">CANCEL</button>
                        </form>
                        <form th:action="@{/bookings/delete/{id}(id=${booking.id})}" method="post">
                            <button type="submit" class="btn btn-danger">DELETE</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
