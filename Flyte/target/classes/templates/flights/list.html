<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flyte - Flights</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
        .topbar { background: #1a1a2e; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #00d4ff33; }
        .topbar h1 { font-size: 24px; color: #00d4ff; letter-spacing: 3px; }
        .topbar nav a { color: #aaa; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .topbar nav a:hover { color: #00d4ff; }
        .container { padding: 40px; }
        .page-title { font-size: 22px; color: #fff; margin-bottom: 24px; }
        .btn { padding: 10px 24px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; text-decoration: none; border: none; letter-spacing: 1px; display: inline-block; margin-bottom: 20px; }
        .btn-primary { background: #00d4ff; color: #0f0f1a; }
        table { width: 100%; border-collapse: collapse; background: #1a1a2e; border-radius: 12px; overflow: hidden; }
        th { background: #0f0f1a; color: #888; font-size: 11px; letter-spacing: 2px; padding: 16px 20px; text-align: left; }
        td { padding: 16px 20px; border-top: 1px solid #ffffff08; }
        tr:hover td { background: #ffffff05; }
        .btn-sm { padding: 6px 16px; font-size: 12px; }
        .btn-danger { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d44; }
        .btn-book { background: #00d4ff22; color: #00d4ff; border: 1px solid #00d4ff44; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>✈ FLYTE</h1>
    <nav>
        <a href="/admin">Dashboard</a>
        <a href="/flights">Flights</a>
        <a href="/bookings">Bookings</a>
    </nav>
</div>
<div class="container">
    <div class="page-title">All Flights</div>
    <a href="/flights/add" class="btn btn-primary">+ ADD FLIGHT</a>
    <table>
        <thead>
            <tr>
                <th>FLIGHT NO.</th><th>ORIGIN</th><th>DESTINATION</th>
                <th>DEPARTURE</th><th>ARRIVAL</th><th>ACTIONS</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="flight : ${flights}">
                <td th:text="${flight.flightNumber}"></td>
                <td th:text="${flight.origin}"></td>
                <td th:text="${flight.destination}"></td>
                <td th:text="${#temporals.format(flight.departureTime, 'dd MMM yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(flight.arrivalTime, 'dd MMM yyyy HH:mm')}"></td>
                <td style="display:flex;gap:8px;">
                    <a th:href="@{/book/{id}(id=${flight.id})}" class="btn btn-book btn-sm">BOOK</a>
                    <form th:action="@{/flights/delete/{id}(id=${flight.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn btn-danger btn-sm">DELETE</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
