<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flyte — Login & Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #080c14;
            --surface: #0d1320;
            --card: #111827;
            --border: rgba(255, 255, 255, 0.07);
            --blue: #2d7ef7;
            --blue-glow: #1a5cc8;
            --blue-soft: rgba(45, 126, 247, 0.12);
            --text: #e8edf5;
            --muted: #6b7a99;
            --white: #ffffff;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
            perspective: 1500px;
        }

        /* Noise texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.4;
        }

        /* Radial gradient overlay */
        body::after {
            content: '';
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(45, 126, 247, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 480px;
            margin: 2rem;
        }

        .flip-card {
            background-color: transparent;
            width: 100%;
            min-height: 560px;
            perspective: 1000px;
            cursor: pointer;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .flip-card-front {
            transform: rotateY(0deg);
        }

        .flip-card-back {
            transform: rotateY(180deg);
        }

        .logo {
            text-align: center;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 2rem;
            letter-spacing: -0.03em;
            margin-bottom: 1rem;
            color: var(--white);
        }

        .logo span {
            color: var(--blue);
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.75rem;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .sub {
            text-align: center;
            color: var(--muted);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
            text-align: left;
        }

        input, select {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 0.85rem 1rem;
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(45, 126, 247, 0.2);
        }

        select {
            cursor: pointer;
        }

        .btn {
            width: 100%;
            background: var(--blue);
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            color: var(--white);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 24px rgba(45, 126, 247, 0.35);
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: #3d8fff;
            transform: translateY(-1px);
            box-shadow: 0 0 32px rgba(45, 126, 247, 0.5);
        }

        .switch-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--muted);
        }

        .switch-link a {
            color: var(--blue);
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .switch-link a:hover {
            text-decoration: underline;
        }

        .msg {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .msg.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
            display: block;
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
            display: block;
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 999;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.85rem 1.25rem;
            font-size: 0.875rem;
            color: var(--text);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.3s ease;
            max-width: 320px;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            border-color: rgba(34, 197, 94, 0.4);
            color: #4ade80;
        }

        .toast-error {
            border-color: rgba(239, 68, 68, 0.4);
            color: #f87171;
        }

        @media (max-width: 550px) {
            .flip-card-front, .flip-card-back {
                padding: 1.5rem;
            }
            .logo {
                font-size: 1.5rem;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="card-container">
    <div class="flip-card" id="flipCard">
        <div class="flip-card-inner">
            <!-- Login Side -->
            <div class="flip-card-front">
                <div class="logo">Fly<span>te</span></div>
                <h2>Welcome back</h2>
                <div class="sub">Sign in to your account</div>

                <div id="loginMsg" class="msg"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="loginUsername" placeholder="Enter your username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn">Sign in</button>
                </form>

                <div class="switch-link">
                    Don't have an account? <a id="showSignup">Create one</a>
                </div>
            </div>

            <!-- Sign Up Side -->
            <div class="flip-card-back">
                <div class="logo">Fly<span>te</span></div>
                <h2>Create account</h2>
                <div class="sub">Start booking flights today</div>

                <div id="signupMsg" class="msg"></div>

                <form id="signupForm">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="signupUsername" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" placeholder="you@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="Min 8 characters" required>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="signupRole">
                            <option value="PASSENGER">Passenger</option>
                            <option value="AGENT">Agent</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Create account</button>
                </form>

                <div class="switch-link">
                    Already have an account? <a id="showLogin">Sign in</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const API_BASE = 'http://localhost:8080''; 

    const flipCard = document.getElementById('flipCard');
    const showSignup = document.getElementById('showSignup');
    const showLogin = document.getElementById('showLogin');
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const loginMsg = document.getElementById('loginMsg');
    const signupMsg = document.getElementById('signupMsg');
    const toastEl = document.getElementById('toast');

    let toastTimer;

    function showToast(message, type = 'info') {
        toastEl.textContent = message;
        toastEl.className = `toast show toast-${type}`;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
            toastEl.classList.remove('show');
        }, 3000);
    }

    function showMessage(element, text, type) {
        element.textContent = text;
        element.className = `msg ${type}`;
        setTimeout(() => {
            element.className = 'msg';
        }, 4000);
    }

    // Flip to signup
    showSignup.addEventListener('click', () => {
        flipCard.classList.add('flipped');
    });

    // Flip to login
    showLogin.addEventListener('click', () => {
        flipCard.classList.remove('flipped');
    });

    // Login submission
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!username || !password) {
            showMessage(loginMsg, 'Please fill in both fields', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/api/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.message || 'Login failed. Please check your credentials.');
            }

            if (data.token) {
                localStorage.setItem('flyte_token', data.token);
                localStorage.setItem('flyte_user', JSON.stringify({
                    username: data.username,
                    role: data.role
                }));
                showMessage(loginMsg, `Welcome back, ${data.username}! Redirecting...`, 'success');
                showToast('Login successful!', 'success');

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                throw new Error('No token received from server');
            }
        } catch (error) {
            console.error('Login error:', error);
            showMessage(loginMsg, error.message, 'error');
            showToast(error.message, 'error');
        }
    });

    // Signup submission
    signupForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('signupUsername').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const password = document.getElementById('signupPassword').value;
        const role = document.getElementById('signupRole').value;

        if (!username || !email || !password) {
            showMessage(signupMsg, 'Please fill in all fields', 'error');
            return;
        }
        if (password.length < 8) {
            showMessage(signupMsg, 'Password must be at least 8 characters', 'error');
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/api/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password, role })
            });

            const text = await response.text();

            if (!response.ok) {
                throw new Error(text || 'Registration failed');
            }

            showMessage(signupMsg, 'Account created! Redirecting to login...', 'success');
            showToast('Registration successful! Please sign in.', 'success');

            // Pre-fill login form with the new username
            document.getElementById('loginUsername').value = username;
            document.getElementById('loginPassword').value = password;

            // Flip back to login after a short delay
            setTimeout(() => {
                flipCard.classList.remove('flipped');
                // Optionally clear signup form
                signupForm.reset();
            }, 2000);

        } catch (error) {
            console.error('Signup error:', error);
            showMessage(signupMsg, error.message, 'error');
            showToast(error.message, 'error');
        }
    });

    // If already logged in, redirect to main page
    const existingToken = localStorage.getItem('flyte_token');
    if (existingToken) {
        showToast('You are already logged in. Redirecting...', 'success');
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 1000);
    }
</script>
</body>
</html>
