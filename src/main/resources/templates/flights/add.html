<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flyte - Add Flight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
        .topbar { background: #1a1a2e; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #00d4ff33; }
        .topbar h1 { font-size: 24px; color: #00d4ff; letter-spacing: 3px; }
        .topbar nav a { color: #aaa; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .card { background: #1a1a2e; border-radius: 16px; padding: 40px; border: 1px solid #00d4ff22; }
        h2 { font-size: 20px; color: #00d4ff; margin-bottom: 30px; letter-spacing: 2px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; letter-spacing: 1px; margin-bottom: 8px; }
        input {
            width: 100%; padding: 12px 16px; background: #0f0f1a;
            border: 1px solid #ffffff22; border-radius: 8px;
            color: #fff; font-size: 14px; outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #00d4ff; }
        .btn { padding: 14px 32px; background: #00d4ff; color: #0f0f1a; border: none; border-radius: 8px; font-size: 14px; font-weight: 900; cursor: pointer; letter-spacing: 1px; width: 100%; margin-top: 10px; }
        .btn:hover { background: #00b8d9; }
        .back { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 13px; }
        .back:hover { color: #00d4ff; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>✈ FLYTE</h1>
    <nav>
        <a href="/admin">Dashboard</a>
        <a href="/flights">Flights</a>
        <a href="/bookings">Bookings</a>
    </nav>
</div>
<div class="container">
    <a href="/flights" class="back">← Back to Flights</a>
    <div class="card">
        <h2>ADD NEW FLIGHT</h2>
        <form action="/flights/add" method="post">
            <div class="form-group">
                <label>FLIGHT NUMBER</label>
                <input type="text" name="flightNumber" placeholder="e.g. FLY-005" required/>
            </div>
            <div class="form-group">
                <label>ORIGIN</label>
                <input type="text" name="origin" placeholder="e.g. Nairobi" required/>
            </div>
            <div class="form-group">
                <label>DESTINATION</label>
                <input type="text" name="destination" placeholder="e.g. London" required/>
            </div>
            <div class="form-group">
                <label>DEPARTURE TIME</label>
                <input type="datetime-local" name="departureTime" required/>
            </div>
            <div class="form-group">
                <label>ARRIVAL TIME</label>
                <input type="datetime-local" name="arrivalTime" required/>
            </div>
            <button type="submit" class="btn">ADD FLIGHT</button>
        </form>
    </div>
</div>
</body>
</html>
