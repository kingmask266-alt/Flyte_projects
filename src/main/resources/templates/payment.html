<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Flyte — Complete Your Payment</title>

    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

        :root {
            --bg:        #0a0c10;
            --surface:   #111318;
            --border:    #1e2128;
            --border-hi: #2a2f3a;
            --text:      #e8eaf0;
            --muted:     #6b7280;
            --gold:      #f5a623;
            --gold-dim:  #c47d0e;
            --green:     #22c55e;
            --red:       #ef4444;
            --blue:      #3b82f6;
            --radius:    14px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── NAVBAR ── */
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 2.5rem;
            border-bottom: 1px solid var(--border);
            background: rgba(10,12,16,0.9);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: var(--text);
        }
        .logo span { color: var(--gold); }
        .nav-step {
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── LAYOUT ── */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 2rem;
            max-width: 1060px;
            margin: 3rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        /* ── CARDS ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.8rem;
        }
        .card-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1.4rem;
        }

        /* ── BOOKING SUMMARY ── */
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.85rem 0;
            border-bottom: 1px solid var(--border);
        }
        .summary-row:last-of-type { border-bottom: none; }
        .summary-label { color: var(--muted); font-size: 0.88rem; }
        .summary-value { font-weight: 500; font-size: 0.92rem; }
        .summary-value.route { font-weight: 600; font-size: 1rem; }
        .summary-value.amount {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--gold);
        }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.65rem;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 500;
            background: rgba(245,166,35,0.12);
            color: var(--gold);
            border: 1px solid rgba(245,166,35,0.25);
        }

        /* ── PAYMENT TABS ── */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.6rem;
            background: var(--bg);
            border-radius: 10px;
            padding: 0.3rem;
        }
        .tab-btn {
            flex: 1;
            padding: 0.65rem;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border-hi);
        }
        .tab-btn img { width: 18px; height: 18px; object-fit: contain; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── FORM ELEMENTS ── */
        label {
            display: block;
            font-size: 0.78rem;
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        input[type="text"], input[type="tel"] {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border-hi);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1.2rem;
        }
        input:focus { border-color: var(--gold); }
        input::placeholder { color: var(--muted); }

        /* Stripe element container */
        .stripe-element {
            background: var(--bg);
            border: 1px solid var(--border-hi);
            border-radius: 8px;
            padding: 0.85rem 1rem;
            margin-bottom: 1.2rem;
            transition: border-color 0.2s;
        }
        .stripe-element.focused { border-color: var(--gold); }

        /* ── BUTTONS ── */
        .pay-btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .pay-btn:disabled { opacity: 0.55; cursor: not-allowed; }

        .mpesa-btn {
            background: linear-gradient(135deg, #00a651, #007a3d);
            color: #fff;
        }
        .mpesa-btn:not(:disabled):hover {
            background: linear-gradient(135deg, #00c060, #009a4d);
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(0,166,81,0.3);
        }

        .stripe-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            color: #0a0c10;
        }
        .stripe-btn:not(:disabled):hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(245,166,35,0.3);
        }

        /* ── STATUS MESSAGES ── */
        .status-msg {
            display: none;
            margin-top: 1rem;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-size: 0.88rem;
            line-height: 1.5;
        }
        .status-msg.success {
            display: block;
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: var(--green);
        }
        .status-msg.error {
            display: block;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: var(--red);
        }
        .status-msg.info {
            display: block;
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.3);
            color: var(--blue);
        }

        /* ── SECURITY NOTE ── */
        .security-note {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        /* ── SPINNER ── */
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        .spinner.dark {
            border-color: rgba(0,0,0,0.2);
            border-top-color: #000;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── RESPONSIVE ── */
        @media (max-width: 720px) {
            main { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">FL<span>Y</span>TE</div>
    <div class="nav-step">Step 3 of 3 — Payment</div>
</nav>

<main>

    <!-- LEFT: BOOKING SUMMARY -->
    <div>
        <div class="card">
            <div class="card-title">Booking Summary</div>

            <div class="summary-row">
                <span class="summary-label">Booking ID</span>
                <span class="summary-value" th:text="'#' + ${booking.id}">#0</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Passenger</span>
                <span class="summary-value" th:text="${booking.passengerName}">—</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Route</span>
                <span class="summary-value route"
                      th:text="${booking.flight.origin + ' → ' + booking.flight.destination}">—</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Flight</span>
                <span class="summary-value" th:text="${booking.flight.flightNumber}">—</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Cabin</span>
                <span class="badge" th:text="${booking.seatClass}">ECONOMY</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Seat</span>
                <span class="summary-value" th:text="${booking.seatNumber}">—</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Total Due</span>
                <span class="summary-value amount"
                      th:text="'KES ' + ${#numbers.formatDecimal(booking.price, 1, 'COMMA', 0, 'POINT')}">
                    KES 0
                </span>
            </div>
        </div>
    </div>

    <!-- RIGHT: PAYMENT FORM -->
    <div>
        <div class="card">
            <div class="card-title">Payment Method</div>

            <!-- TABS -->
            <div class="tabs">
                <button class="tab-btn active" id="tab-mpesa" type="button" data-action="switch-tab" data-tab="mpesa">
                    📱 M-Pesa
                </button>
                <button class="tab-btn" id="tab-stripe" type="button" data-action="switch-tab" data-tab="stripe">
                    💳 Card (Stripe)
                </button>
            </div>

            <!-- ── MPESA PANEL ── -->
            <div class="tab-panel active" id="panel-mpesa">
                <form id="mpesa-form" th:action="@{/api/payments/mpesa/pay}" method="post">
                    <label for="phone-input">Safaricom Number</label>
                    <input type="tel" id="phone-input" placeholder="e.g. 0712345678"
                           maxlength="13" autocomplete="tel"/>

                    <button class="pay-btn mpesa-btn" id="mpesa-pay-btn" type="submit">
                        <span class="spinner" id="mpesa-spinner"></span>
                        <span id="mpesa-btn-text">Pay with M-Pesa</span>
                    </button>
                </form>

                <div class="status-msg" id="mpesa-status"></div>

                <div class="security-note">
                    🔒 You will receive an STK Push on your phone. Enter your M-Pesa PIN to confirm.
                </div>
            </div>

            <!-- ── STRIPE PANEL ── -->
            <div class="tab-panel" id="panel-stripe">
                <form id="stripe-form" th:action="@{/api/payments/stripe/intent/{bookingId}(bookingId=${booking.id})}" method="post">
                    <label for="card-holder">Cardholder Name</label>
                    <input type="text" id="card-holder" placeholder="Name on card"
                           th:value="${booking.passengerName}"/>

                    <label>Card Details</label>
                    <div class="stripe-element" id="card-element"></div>

                    <button class="pay-btn stripe-btn" id="stripe-pay-btn" type="submit">
                        <span class="spinner dark" id="stripe-spinner"></span>
                        <span id="stripe-btn-text">Pay with Card</span>
                    </button>
                </form>

                <div class="status-msg" id="stripe-status"></div>

                <div class="security-note">
                    🔒 Secured by Stripe. Your card details are never stored on our servers.
                </div>
            </div>
        </div>
    </div>

</main>

<!-- ═══════════════ JAVASCRIPT ═══════════════ -->
<script th:inline="javascript">
    // ── Data injected from Spring ──
    const BOOKING_ID       = /*[[${booking.id}]]*/ 0;
    const STRIPE_PUB_KEY   = /*[[${stripePublishableKey}]]*/ '';
    const JWT_TOKEN        = localStorage.getItem('flyte_token') || '';

    // ── Auth header helper ──
    function authHeaders(extra) {
        return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + JWT_TOKEN, ...extra };
    }

    // ══════════════════════════════════
    //  TAB SWITCHER
    // ══════════════════════════════════
    function switchTab(tab) {
        ['mpesa', 'stripe'].forEach(t => {
            document.getElementById('tab-' + t).classList.toggle('active', t === tab);
            document.getElementById('panel-' + t).classList.toggle('active', t === tab);
        });
    }

    // ══════════════════════════════════
    //  M-PESA STK PUSH
    // ══════════════════════════════════
    async function payMpesa() {
        const raw   = document.getElementById('phone-input').value.trim();
        const phone = normalizePhone(raw);

        if (!phone) {
            showStatus('mpesa-status', 'error', '❌ Enter a valid Safaricom number (e.g. 0712345678).');
            return;
        }

        setLoading('mpesa', true);
        clearStatus('mpesa-status');

        try {
            const res = await fetch('/api/payments/mpesa/pay', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ bookingId: BOOKING_ID, phoneNumber: phone })
            });

            const data = await res.json();

            if (res.ok) {
                showStatus('mpesa-status', 'success',
                    '✅ STK Push sent! Check your phone and enter your M-Pesa PIN to complete payment.');
            } else {
                showStatus('mpesa-status', 'error',
                    '❌ ' + (data.message || data.errorMessage || 'Payment failed. Try again.'));
            }
        } catch (err) {
            showStatus('mpesa-status', 'error', '❌ Network error. Check your connection and try again.');
        } finally {
            setLoading('mpesa', false);
        }
    }

    // Normalize Kenyan phone: 0712... → 254712...
    function normalizePhone(raw) {
        const digits = raw.replace(/\D/g, '');
        if (digits.startsWith('254') && digits.length === 12) return digits;
        if (digits.startsWith('0')   && digits.length === 10) return '254' + digits.slice(1);
        if (digits.startsWith('7')   && digits.length === 9)  return '254' + digits;
        return null;
    }

    // ══════════════════════════════════
    //  STRIPE CARD PAYMENT
    // ══════════════════════════════════
    let stripe = null, cardElement = null;

    function initStripe() {
        if (!STRIPE_PUB_KEY) {
            showStatus('stripe-status', 'error',
                '⚠️ Stripe is not configured yet. Add stripe.public.key to application.properties and restart.');
            document.getElementById('stripe-pay-btn').disabled = true;
            return;
        }
        stripe      = Stripe(STRIPE_PUB_KEY);
        const elements = stripe.elements({ appearance: stripeAppearance() });
        cardElement = elements.create('card');
        cardElement.mount('#card-element');
        cardElement.on('focus', () => document.getElementById('card-element').classList.add('focused'));
        cardElement.on('blur',  () => document.getElementById('card-element').classList.remove('focused'));
    }

    async function payStripe() {
        if (!stripe) {
            showStatus('stripe-status', 'error', '⚠️ Stripe is not initialized.');
            return;
        }

        setLoading('stripe', true);
        clearStatus('stripe-status');

        try {
            // 1. Get PaymentIntent client secret from backend
            const intentRes = await fetch('/api/payments/stripe/intent/' + BOOKING_ID, {
                method: 'POST',
                headers: authHeaders()
            });
            const intentData = await intentRes.json();

            if (!intentRes.ok) {
                showStatus('stripe-status', 'error',
                    '❌ ' + (intentData.message || 'Could not create payment intent.'));
                return;
            }

            // 2. Confirm card payment with Stripe.js
            const { error, paymentIntent } = await stripe.confirmCardPayment(intentData.clientSecret, {
                payment_method: {
                    card: cardElement,
                    billing_details: { name: document.getElementById('card-holder').value }
                }
            });

            if (error) {
                showStatus('stripe-status', 'error', '❌ ' + error.message);
            } else if (paymentIntent.status === 'succeeded') {
                showStatus('stripe-status', 'success',
                    '✅ Payment successful! Your booking is confirmed. Redirecting...');
                setTimeout(() => window.location.href = '/dashboard', 2500);
            }
        } catch (err) {
            showStatus('stripe-status', 'error', '❌ Network error. Try again.');
        } finally {
            setLoading('stripe', false);
        }
    }

    function stripeAppearance() {
        return {
            theme: 'night',
            variables: {
                colorPrimary:    '#f5a623',
                colorBackground: '#0a0c10',
                colorText:       '#e8eaf0',
                colorDanger:     '#ef4444',
                fontFamily:      'DM Sans, sans-serif',
                borderRadius:    '8px',
            }
        };
    }

    // ══════════════════════════════════
    //  UI HELPERS
    // ══════════════════════════════════
    function setLoading(method, on) {
        const btn     = document.getElementById(method + '-pay-btn');
        const spinner = document.getElementById(method + '-spinner');
        const text    = document.getElementById(method + '-btn-text');
        btn.disabled       = on;
        spinner.style.display = on ? 'block' : 'none';
        text.textContent   = on ? 'Processing...' : (method === 'mpesa' ? 'Pay with M-Pesa' : 'Pay with Card');
    }

    function showStatus(id, type, msg) {
        const el = document.getElementById(id);
        el.className    = 'status-msg ' + type;
        el.textContent  = msg;
    }

    function clearStatus(id) {
        const el = document.getElementById(id);
        el.className = 'status-msg';
        el.textContent = '';
    }

    function initActionHandlers() {
        document.addEventListener('click', (event) => {
            const trigger = event.target.closest('[data-action]');
            if (!trigger) {
                return;
            }

            if (trigger.dataset.action === 'switch-tab') {
                event.preventDefault();
                switchTab(trigger.dataset.tab);
            }
        });

        const mpesaForm = document.getElementById('mpesa-form');
        if (mpesaForm) {
            mpesaForm.addEventListener('submit', (event) => {
                event.preventDefault();
                payMpesa();
            });
        }

        const stripeForm = document.getElementById('stripe-form');
        if (stripeForm) {
            stripeForm.addEventListener('submit', (event) => {
                event.preventDefault();
                payStripe();
            });
        }
    }

    // ── Boot ──
    document.addEventListener('DOMContentLoaded', () => {
        initActionHandlers();
        initStripe();
    });
</script>

</body>
</html>
