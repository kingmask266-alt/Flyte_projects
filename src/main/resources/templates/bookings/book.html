<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flyte - Book a Flight</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
        .topbar { background: #1a1a2e; padding: 18px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #00d4ff33; }
        .topbar h1 { font-size: 24px; color: #00d4ff; letter-spacing: 3px; }
        .topbar nav a { color: #aaa; text-decoration: none; margin-left: 24px; font-size: 14px; }
        .container { max-width: 600px; margin: 60px auto; padding: 0 20px; }
        .card { background: #1a1a2e; border-radius: 16px; padding: 40px; border: 1px solid #00d4ff22; }
        h2 { font-size: 20px; color: #00d4ff; margin-bottom: 10px; letter-spacing: 2px; }
        .flight-info {
            background: #0f0f1a; border-radius: 10px; padding: 20px;
            margin-bottom: 28px; border: 1px solid #ffffff11;
        }
        .flight-route { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .flight-meta { font-size: 13px; color: #888; }
        .flight-number { color: #00d4ff; font-weight: 700; font-size: 13px; margin-bottom: 8px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; letter-spacing: 1px; margin-bottom: 8px; }
        input {
            width: 100%; padding: 12px 16px; background: #0f0f1a;
            border: 1px solid #ffffff22; border-radius: 8px;
            color: #fff; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        input:focus { border-color: #00d4ff; }
        .btn { padding: 14px 32px; background: #00d4ff; color: #0f0f1a; border: none; border-radius: 8px; font-size: 14px; font-weight: 900; cursor: pointer; letter-spacing: 1px; width: 100%; margin-top: 10px; }
        .btn:hover { background: #00b8d9; }
        .back { display: inline-block; margin-bottom: 20px; color: #888; text-decoration: none; font-size: 13px; }
        .back:hover { color: #00d4ff; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>✈ FLYTE</h1>
    <nav>
        <a href="/admin">Dashboard</a>
        <a href="/flights">Flights</a>
        <a href="/bookings">Bookings</a>
    </nav>
</div>
<div class="container">
    <a href="/flights" class="back">← Back to Flights</a>
    <div class="card">
        <h2>BOOK FLIGHT</h2>
        <div class="flight-info" th:if="${flight}">
            <div class="flight-number" th:text="${flight.flightNumber}"></div>
            <div class="flight-route" th:text="${flight.origin + ' → ' + flight.destination}"></div>
            <div class="flight-meta">
                Departure: <span th:text="${#temporals.format(flight.departureTime, 'dd MMM yyyy HH:mm')}"></span>
                &nbsp;|&nbsp;
                Arrival: <span th:text="${#temporals.format(flight.arrivalTime, 'dd MMM yyyy HH:mm')}"></span>
            </div>
        </div>
        <form th:action="@{/book/{id}(id=${flight.id})}" method="post">
            <div class="form-group">
                <label>PASSENGER NAME</label>
                <input type="text" name="passengerName" placeholder="Full name" required/>
            </div>
            <button type="submit" class="btn">CONFIRM BOOKING</button>
        </form>
    </div>
</div>
</body>
</html>
