<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Flyte Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }

        .topbar {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #00d4ff33;
        }
        .topbar h1 { font-size: 28px; color: #00d4ff; letter-spacing: 3px; font-weight: 900; }
        .topbar nav a {
            color: #aaa; text-decoration: none; margin-left: 24px;
            font-size: 14px; letter-spacing: 1px;
            transition: color 0.2s;
        }
        .topbar nav a:hover { color: #00d4ff; }

        .stats {
            display: flex; gap: 24px;
            padding: 32px 40px 0;
        }
        .stat-card {
            background: #1a1a2e;
            border: 1px solid #00d4ff22;
            border-radius: 12px;
            padding: 24px 36px;
            flex: 1;
            text-align: center;
        }
        .stat-card .number { font-size: 48px; font-weight: 900; color: #00d4ff; }
        .stat-card .label { font-size: 13px; color: #888; margin-top: 6px; letter-spacing: 1px; }

        .section {
            margin: 32px 40px;
            background: #1a1a2e;
            border-radius: 12px;
            border: 1px solid #ffffff11;
            overflow: hidden;
        }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 28px;
            background: #16213e;
            border-bottom: 1px solid #ffffff11;
        }
        .section-header h2 { font-size: 16px; letter-spacing: 2px; color: #00d4ff; }
        .btn {
            padding: 8px 20px; border-radius: 8px; font-size: 13px;
            font-weight: 700; cursor: pointer; text-decoration: none;
            transition: all 0.2s; border: none; letter-spacing: 1px;
        }
        .btn-primary { background: #00d4ff; color: #0f0f1a; }
        .btn-primary:hover { background: #00b8d9; }
        .btn-danger { background: #ff4d4d22; color: #ff4d4d; border: 1px solid #ff4d4d44; }
        .btn-danger:hover { background: #ff4d4d44; }
        .btn-sm { padding: 5px 14px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; }
        th {
            background: #0f0f1a; color: #888;
            font-size: 11px; letter-spacing: 2px;
            padding: 14px 20px; text-align: left;
        }
        td { padding: 14px 20px; border-top: 1px solid #ffffff08; font-size: 14px; }
        tr:hover td { background: #ffffff05; }

        .badge {
            display: inline-block; padding: 3px 12px;
            border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 1px;
        }
        .badge-confirmed { background: #00ff8822; color: #00ff88; }
        .badge-pending    { background: #ffaa0022; color: #ffaa00; }
        .badge-cancelled  { background: #ff4d4d22; color: #ff4d4d; }

        .actions form { display: inline; }
        .actions { display: flex; gap: 8px; align-items: center; }
    </style>
</head>
<body>

<div class="topbar">
    <h1>✈ FLYTE</h1>
    <nav>
        <a href="/admin">Dashboard</a>
        <a href="/flights">Flights</a>
        <a href="/bookings">Bookings</a>
        <a href="/flights/add">+ Add Flight</a>
    </nav>
</div>

<!-- Stats -->
<div class="stats">
    <div class="stat-card">
        <div class="number" th:text="${totalFlights}">0</div>
        <div class="label">TOTAL FLIGHTS</div>
    </div>
    <div class="stat-card">
        <div class="number" th:text="${totalBookings}">0</div>
        <div class="label">TOTAL BOOKINGS</div>
    </div>
    <div class="stat-card">
        <div class="number">✓</div>
        <div class="label">SYSTEM ACTIVE</div>
    </div>
</div>

<!-- Flights Section -->
<div class="section">
    <div class="section-header">
        <h2>FLIGHTS</h2>
        <a href="/flights/add" class="btn btn-primary">+ ADD FLIGHT</a>
    </div>
    <table>
        <thead>
            <tr>
                <th>FLIGHT NO.</th>
                <th>ORIGIN</th>
                <th>DESTINATION</th>
                <th>DEPARTURE</th>
                <th>ARRIVAL</th>
                <th>ACTIONS</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="flight : ${flights}">
                <td th:text="${flight.flightNumber}"></td>
                <td th:text="${flight.origin}"></td>
                <td th:text="${flight.destination}"></td>
                <td th:text="${#temporals.format(flight.departureTime, 'dd MMM yyyy HH:mm')}"></td>
                <td th:text="${#temporals.format(flight.arrivalTime, 'dd MMM yyyy HH:mm')}"></td>
                <td>
                    <div class="actions">
                        <a th:href="@{/book/{id}(id=${flight.id})}" class="btn btn-primary btn-sm">BOOK</a>
                        <form th:action="@{/flights/delete/{id}(id=${flight.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm">DELETE</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Bookings Section -->
<div class="section">
    <div class="section-header">
        <h2>BOOKINGS</h2>
        <a href="/bookings" class="btn btn-primary">VIEW ALL</a>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>PASSENGER</th>
                <th>FLIGHT</th>
                <th>ROUTE</th>
                <th>STATUS</th>
                <th>ACTIONS</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="booking : ${bookings}">
                <td th:text="${booking.id}"></td>
                <td th:text="${booking.passengerName}"></td>
                <td th:text="${booking.flight.flightNumber}"></td>
                <td th:text="${booking.flight.origin + ' → ' + booking.flight.destination}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${booking.status == 'Confirmed'} ? 'badge-confirmed' : (${booking.status == 'Pending'} ? 'badge-pending' : 'badge-cancelled')"
                          th:text="${booking.status}">
                    </span>
                </td>
                <td>
                    <div class="actions">
                        <form th:action="@{/bookings/status/{id}(id=${booking.id})}" method="post">
                            <input type="hidden" name="status" value="Confirmed"/>
                            <button type="submit" class="btn btn-sm" style="background:#00ff8822;color:#00ff88;border:1px solid #00ff8844">CONFIRM</button>
                        </form>
                        <form th:action="@{/bookings/delete/{id}(id=${booking.id})}" method="post">
                            <button type="submit" class="btn btn-danger btn-sm">CANCEL</button>
                        </form>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
