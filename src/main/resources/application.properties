# ==========================================
# FLYTE - Flight Booking System
# Application Configuration
# ==========================================

# Server
server.port=8080
spring.application.name=flyte

# ==========================================
# MySQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/flyte_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=flyte1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=flyte-super-secret-jwt-key-must-be-at-least-256-bits-long-for-security
jwt.expiration=86400000

# ==========================================
# Stripe Configuration
# ==========================================
stripe.secret.key=sk_test_your_stripe_secret_key_here
stripe.public.key=pk_test_your_stripe_public_key_here

# ==========================================
# Mpesa (Daraja API) Configuration
# ==========================================
mpesa.consumer.key=your_mpesa_consumer_key
mpesa.consumer.secret=your_mpesa_consumer_secret
mpesa.passkey=your_mpesa_passkey
mpesa.shortcode=174379
mpesa.callback.url=https://yourdomain.com/api/payments/mpesa/callback
mpesa.base.url=https://sandbox.safaricom.co.ke

# ==========================================
# Logging
# ==========================================
logging.level.com.flyte=DEBUG
logging.level.org.springframework.security=INFO
