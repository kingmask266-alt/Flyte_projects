# ==========================================
# FLYTE - Flight Booking System
# Application Configuration
# ==========================================

# Server
server.port=8080
spring.application.name=flyte

# ==========================================
# MySQL Database Configuration
# ==========================================
spring.datasource.url=${FLYTE_DB_URL:jdbc:mysql://localhost:3306/flyte_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${FLYTE_DB_USERNAME:root}
spring.datasource.password=${FLYTE_DB_PASSWORD:flyte1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${FLYTE_JWT_SECRET:flyte-super-secret-jwt-key-must-be-at-least-256-bits-long-for-security}
jwt.expiration=${FLYTE_JWT_EXPIRATION:86400000}

# ==========================================
# Stripe Configuration
# ==========================================
stripe.secret.key=${FLYTE_STRIPE_SECRET_KEY:}
stripe.public.key=${FLYTE_STRIPE_PUBLIC_KEY:}
stripe.webhook.secret=${FLYTE_STRIPE_WEBHOOK_SECRET:}

# ==========================================
# Mpesa (Daraja API) Configuration
