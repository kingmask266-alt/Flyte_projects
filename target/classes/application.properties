# ==========================================
# Logging
# ==========================================
logging.level.com.flyte=DEBUG
logging.level.org.springframework.security=INFO

# Default seeded admin account
flyte.admin.username=${FLYTE_ADMIN_USERNAME:admin}
flyte.admin.email=${FLYTE_ADMIN_EMAIL:admin@flyte.local}
flyte.admin.password=${FLYTE_ADMIN_PASSWORD:password123}
spring.jpa.open-in-view=false
server.error.include-message=always
server.error.include-stacktrace=always